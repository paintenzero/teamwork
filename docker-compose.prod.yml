# Production deployment for a remote server. Uses the prebuilt multi-arch images
# (paintezero/orchestra, paintezero/orchestra-web). Only the web port is published;
# Redis / Postgres / S3 stay on the internal network. Configure via a `.env` file
# next to this one (copy .env.prod.example). After changing any Redis password,
# regenerate the ACL: `node scripts/gen-acl.mjs`.
#
#   docker compose -f docker-compose.prod.yml --env-file .env pull
#   docker compose -f docker-compose.prod.yml --env-file .env up -d
#
# Build/push the images first (multi-arch): ./scripts/build-images.sh

name: orchestra

x-app-image: &app-image "${ORCHESTRA_IMAGE:-paintezero/orchestra:latest}"

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--aclfile", "/etc/redis/users.acl"]
    volumes:
      - "redis-data:/data"
      - "./redis/users.acl:/etc/redis/users.acl:ro"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${ORCHESTRA_ADMIN_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-orchestra}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-orchestra}"
      POSTGRES_DB: "${POSTGRES_DB:-orchestra}"
    volumes:
      - "pg-data:/var/lib/postgresql/data"
      - "./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orchestra}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: "server -s3 -dir=/data"
    volumes:
      - "weed-data:/data"
    restart: unless-stopped

  recorder:
    image: *app-image
    command: ["pnpm", "recorder"]
    environment:
      REDIS_URL: "redis://redis:6379"
      REDIS_USERNAME: "recorder"
      REDIS_PASSWORD: "${ORCHESTRA_REC_PASSWORD}"
      DATABASE_URL: "postgres://${POSTGRES_USER:-orchestra}:${POSTGRES_PASSWORD:-orchestra}@postgres:5432/${POSTGRES_DB:-orchestra}"
      S3_ENDPOINT: "http://seaweedfs:8333"
      S3_BUCKET: "${S3_BUCKET:-orchestra}"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY:-orchestra}"
      S3_SECRET_KEY: "${S3_SECRET_KEY:-orchestra}"
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
      seaweedfs: { condition: service_started }
    restart: unless-stopped

  orchestrator:
    image: *app-image
    command: ["pnpm", "orchestrator"]
    environment:
      PORT: "3001"
      REDIS_URL: "redis://redis:6379"
      REDIS_USERNAME: "orchestrator"
      REDIS_PASSWORD: "${ORCHESTRA_ORCH_PASSWORD}"
      DATABASE_URL: "postgres://${POSTGRES_USER:-orchestra}:${POSTGRES_PASSWORD:-orchestra}@postgres:5432/${POSTGRES_DB:-orchestra}"
      S3_ENDPOINT: "http://seaweedfs:8333"
      S3_BUCKET: "${S3_BUCKET:-orchestra}"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY:-orchestra}"
      S3_SECRET_KEY: "${S3_SECRET_KEY:-orchestra}"
      GATEWAY_TOKEN: "${GATEWAY_TOKEN}"
      GATEWAY_RATE_LIMIT_RPS: "${GATEWAY_RATE_LIMIT_RPS:-50}"
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    restart: unless-stopped

  # One agent. Copy this block (distinct AGENT_ID + its own ACL user) to add more.
  agent-researcher:
    image: *app-image
    command: ["pnpm", "agent"]
    environment:
      AGENT_ID: "agent-researcher"
      AGENT_DESCRIPTION: "${AGENT_RESEARCHER_DESCRIPTION:-A research assistant: answers questions and coordinates teammates.}"
      AGENT_CAPABILITIES: "chat,research,clock"
      ROSTER_REFRESH_MS: "${ROSTER_REFRESH_MS:-60000}"
      REDIS_URL: "redis://redis:6379"
      REDIS_USERNAME: "agent-researcher"
      REDIS_PASSWORD: "${AGENT_RESEARCHER_PASSWORD}"
      S3_ENDPOINT: "http://seaweedfs:8333"
      S3_BUCKET: "${S3_BUCKET:-orchestra}"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY:-orchestra}"
      S3_SECRET_KEY: "${S3_SECRET_KEY:-orchestra}"
      # Model: faux by default (token-free). Set ANTHROPIC_API_KEY or an OpenAI-compatible
      # endpoint for a real model (see .env.prod.example).
      AGENT_FAUX: "${AGENT_FAUX:-1}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      MAX_RUN_MS: "${MAX_RUN_MS:-0}"
    depends_on:
      redis: { condition: service_healthy }
      seaweedfs: { condition: service_started }
    restart: unless-stopped

  web:
    image: "${ORCHESTRA_WEB_IMAGE:-paintezero/orchestra-web:latest}"
    environment:
      ORCHESTRATOR_UPSTREAM: "http://orchestrator:3001"
      GATEWAY_TOKEN: "${GATEWAY_TOKEN}"
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - orchestrator
    restart: unless-stopped

volumes:
  redis-data: {}
  pg-data: {}
  weed-data: {}
