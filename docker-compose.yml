services:
  redis:
    image: redis:7-alpine
    # Phase 6: ACL users from a mounted file; no-auth connections are refused.
    command: ["redis-server", "--appendonly", "yes", "--aclfile", "/etc/redis/users.acl"]
    ports: ["6379:6379"]
    volumes:
      - "redis-data:/data"
      - "./redis/users.acl:/etc/redis/users.acl"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "orchestra-admin", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orchestra
      POSTGRES_PASSWORD: orchestra
      POSTGRES_DB: orchestra
    ports: ["5432:5432"]
    volumes:
      - "pg-data:/var/lib/postgresql/data"
      - "./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestra"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Object storage (trace archive — Phase 3; artifact exchange — Phase 5) is an
  # external, S3-compatible service: set S3_ENDPOINT (+ S3_BUCKET / S3_ACCESS_KEY /
  # S3_SECRET_KEY) in .env. For a local one, uncomment the RustFS service below and
  # point S3_ENDPOINT at http://localhost:9000.
  # rustfs:
  #   image: rustfs/rustfs:latest
  #   environment:
  #     RUSTFS_ACCESS_KEY: orchestra
  #     RUSTFS_SECRET_KEY: orchestra-secret
  #   ports: ["9000:9000"]
  #   volumes: ["rustfs-data:/data"]

volumes:
  redis-data: {}
  pg-data: {}
  # rustfs-data: {}
